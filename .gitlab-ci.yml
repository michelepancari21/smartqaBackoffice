stages:
  - build
  - deploy
  - post-action

variables:
  AWS_DEFAULT_REGION: eu-west-1
  BUILD_DIR: "dist" # Ajuste selon ton dossier build (dist, build, public...)

.only_dev: &only_dev
  only:
    refs:
      - master
    variables:
      - $CI_COMMIT_MESSAGE !~ /\[skip release\]/

.only_prod: &only_prod
  only:
    - tags

####### AUTH (AWS, COMPOSER, SSH) #######
.aws_auth: &aws_auth
  - sts=$( aws sts assume-role --role-arn "${ROLE_ARN}" --role-session-name ${CI_COMMIT_SHORT_SHA} --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text )
  - export AWS_ACCESS_KEY_ID=$( echo "${sts}" | awk '{print $1}' )
  - export AWS_SECRET_ACCESS_KEY=$( echo "${sts}" | awk '{print $2}' )
  - export AWS_SESSION_TOKEN=$( echo "${sts}" | awk '{print $3}' )

.ssh_auth: &ssh_auth
  - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  - ssh-keyscan gitlab-ssh.dvtech.io >> ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
  - eval $(ssh-agent -s)
  - echo "$SSH_PRIVATE_KEY" | tr  -d '\r' | ssh-add - > /dev/null

build:development:
  image: node:20-alpine
  stage: build
  script:
    - npm install
    - npm run build-$STAGE
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 hour
  variables:
    STAGE: dev
    AWS_DEFAULT_REGION: eu-west-1
    ROLE_ARN: arn:aws:iam::679799247858:role/dvf-smartqa-dev-role-sls-deployment
    S3_BUCKET_NAME: "smartqa-dev-backoffice-s3"
    CLOUDFRONT_DISTRIBUTION_ID: "EUUFAWIMAZXPX"
  cache:
    paths:
      - node_modules/
  <<: *only_dev

deploy:development:
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  stage: deploy
  variables:
    STAGE: dev
    AWS_DEFAULT_REGION: eu-west-1
    ROLE_ARN: arn:aws:iam::679799247858:role/dvf-smartqa-dev-role-sls-deployment
    S3_BUCKET_NAME: "smartqa-dev-backoffice-s3"
    CLOUDFRONT_DISTRIBUTION_ID: "EUUFAWIMAZXPX"
  before_script:
    - *aws_auth
  script:
    - aws s3 sync "${BUILD_DIR}/" "s3://${S3_BUCKET_NAME}/" --delete
    - aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
  <<: *only_dev

build:production:
  image: node:20-alpine
  stage: build
  script:
    - npm install
    - npm run build-$STAGE
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 hour
  variables:
    STAGE: prod
    AWS_DEFAULT_REGION: eu-west-1
    ROLE_ARN: arn:aws:iam::926783724271:role/dvf-smartqa-prod-role-sls-deployment
    S3_BUCKET_NAME: "smartqa-prod-backoffice-s3"
    CLOUDFRONT_DISTRIBUTION_ID: "E2UZQUWUZFM3OT"
  cache:
    paths:
      - node_modules/
  <<: *only_prod

deploy:production:
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  stage: deploy
  variables:
    STAGE: prod
    AWS_DEFAULT_REGION: eu-west-1
    ROLE_ARN: arn:aws:iam::926783724271:role/dvf-smartqa-prod-role-sls-deployment
    S3_BUCKET_NAME: "smartqa-prod-backoffice-s3"
    CLOUDFRONT_DISTRIBUTION_ID: "E2UZQUWUZFM3OT"
  before_script:
    - *aws_auth
  script:
    - aws s3 sync "${BUILD_DIR}/" "s3://${S3_BUCKET_NAME}/" --delete
    - aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
  <<: *only_prod

####### POST ACTION JOBS (RELEASE, UPDATE DOCS) #######
release-version:
  stage: post-action
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor
      - node_modules
    policy: pull
  variables:
    GIT_AUTHOR_NAME: "Gitlab Bot"
    GIT_AUTHOR_EMAIL: "gitlab-bot@digitalvirgo.com"
    GIT_COMMITTER_NAME: "Gitlab Bot"
    GIT_COMMITTER_EMAIL: "gitlab-bot@digitalvirgo.com"
    AWS_DEFAULT_REGION: eu-west-1
    ROLE_ARN: arn:aws:iam::926783724271:role/dvf-smartqa-prod-role-sls-deployment
  before_script:
    - *aws_auth
    - *ssh_auth
  script:
    - npm ci && npx semantic-release
  only:
    refs:
      - master
    variables:
      - $CI_COMMIT_MESSAGE !~ /skip release/
  when: manual